packages:
  - "packages/*"
  - "koishi/*"
  - "apps/*"

# Vite+ alpha spike (apps/web only). Vite+ replaces vite via npm overrides
# rather than coexisting. We scope the override to the web sub-tree only —
# `@bilibili-notify/web>vite` matches "vite" anywhere reachable from
# apps/web's dep graph (so @vitejs/plugin-react, @tailwindcss/vite etc. all
# fall under it), but leaves @koishijs/client → vite ^5.4.10 alone. Without
# the dependent prefix, the override would also rewrite the koishi console
# UI's vite 5 to vite 8 (vp's bundled vite), which is a 3-major-version
# jump with breaking config/plugin API. We intentionally do NOT override
# vitest yet, since apps/server's test pipeline isn't part of this spike.
overrides:
  "@bilibili-notify/web>vite": "npm:@voidzero-dev/vite-plus-core@^0.1.20"

# Match the previous yarn classic-style flat hoist, so koishi's plugin loader
# (which expects deps to live in a single hoisted node_modules tree) keeps
# working as before. pnpm 11 reads nodeLinker from pnpm-workspace.yaml; the
# old .npmrc (`node-linker=hoisted`) is no longer the source of truth at the
# workspace level.
nodeLinker: hoisted

# pnpm 11 makes postinstall opt-in by default to mitigate supply-chain
# risk. Each entry below is a transitive dep that ships a build script.
# All five are widely-used, well-known packages whose postinstalls are
# benign (native binary builds + git-hook installer). Re-evaluate when
# bumping versions; CI fails install if a *new* unapproved entry appears.
allowBuilds:
  "@parcel/watcher": true # native fsevents/inotify shim used by vite watcher
  esbuild: true # downloads matching native binary
  lefthook: true # repo's git hooks installer (root prepare script)
  protobufjs: true # generates .js from .proto at install time
  vue-demi: true # writes vue 2/3 shim at install time

minimumReleaseAgeExclude:
  - '@voidzero-dev/vite-plus-core@0.1.22'
  - '@voidzero-dev/vite-plus-darwin-arm64@0.1.22'
  - '@voidzero-dev/vite-plus-darwin-x64@0.1.22'
  - '@voidzero-dev/vite-plus-linux-arm64-gnu@0.1.22'
  - '@voidzero-dev/vite-plus-linux-arm64-musl@0.1.22'
  - '@voidzero-dev/vite-plus-linux-x64-gnu@0.1.22'
  - '@voidzero-dev/vite-plus-linux-x64-musl@0.1.22'
  - '@voidzero-dev/vite-plus-test@0.1.22'
  - '@voidzero-dev/vite-plus-win32-arm64-msvc@0.1.22'
  - '@voidzero-dev/vite-plus-win32-x64-msvc@0.1.22'
  - vite-plus@0.1.22
