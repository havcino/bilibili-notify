name: bilibili-notify — build + publish

# Required repo secret: DOCKERHUB_TOKEN

on:
  push:
    branches:
      - refactor
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".dockerignore"
      - ".github/workflows/image-release.yml"
    tags:
      - "image-v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: akokk0
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/akokk0/bilibili-notify
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (load, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/Dockerfile
          load: true
          push: false
          tags: bilibili-notify:smoke
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # BN_ALLOW_NO_AUTH=1 needed: image binds 0.0.0.0 with no credentials, so
      # bare-auth-policy.ts would otherwise process.exit(1).
      - name: Smoke test (blocks push on failure)
        run: |
          set -euo pipefail
          docker run -d --name bn-smoke -p 8787:8787 \
            -e BN_DATA_DIR=/tmp/bn -e BN_ALLOW_NO_AUTH=1 bilibili-notify:smoke
          ok=
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8787/api/health 2>/dev/null | jq -e '.status=="ok"' >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          if [ -z "$ok" ]; then
            echo "::error::/api/health never returned status:ok within ~60s"
            docker logs bn-smoke || true
            exit 1
          fi
          ct=$(curl -fsS -o /tmp/root.html -w '%{content_type}' http://localhost:8787/)
          echo "GET / -> content-type: $ct"
          case "$ct" in
            text/html*) ;;
            *) echo "::error::GET / expected text/html (dashboard), got '$ct'"
               head -c 400 /tmp/root.html || true; docker logs bn-smoke || true; exit 1 ;;
          esac
          grep -q '<div id="root">' /tmp/root.html \
            || { echo "::error::GET / body is not the dashboard index.html"; head -c 400 /tmp/root.html; exit 1; }

      - name: Stop smoke container
        if: always()
        run: docker rm -f bn-smoke >/dev/null 2>&1 || true

      # commit message 含 `[dry-run]` 时跳过推送(其它 step 照跑,用来验证 build + smoke)
      - name: Push image
        if: ${{ !contains(github.event.head_commit.message, '[dry-run]') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
