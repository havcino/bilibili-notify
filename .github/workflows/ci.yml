name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Installs Vite+ (vp) globally, the repo-pinned Node from .node-version
      # (24.15.0), and runs `vp install`. On GitHub Actions CI=true → the
      # underlying pnpm install is frozen-lockfile automatically (= old
      # `pnpm install --frozen-lockfile`). `cache: true` keys off pnpm-lock.yaml.
      - name: Setup Vite+ (vp) + Node + deps
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      - name: Lint (Biome)
        run: vp exec biome ci .

      # `vpr <script>` 是 vp 的 shim 简写,等价 `vp run <script>`,从 root
      # package.json scripts 入口走。build 内部 `pnpm -r run build + koishi
      # console client`;vp 把内嵌 pnpm 注入子进程 PATH 让 legacy script body
      # 继续 work。这是双端 build(packages + koishi shells + apps/server vp
      # pack + apps/web Vite)。typecheck 与 test 同模式。
      - name: Build (double-end)
        run: vpr build

      - name: Typecheck
        run: vpr typecheck

      - name: Test
        run: vpr test
