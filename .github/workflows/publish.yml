name: Publish

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  ci-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      # Installs vp + repo-pinned Node (.node-version) + runs `vp install`
      # (frozen on CI). `registry-url` makes setup-vp write ~/.npmrc with
      # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` so `pnpm publish`
      # authenticates via the NODE_AUTH_TOKEN on the changesets step below.
      # pnpm 11 still reads ~/.npmrc for auth/registry (non-auth config moved
      # to pnpm-workspace.yaml).
      - name: Setup Vite+ (vp) + Node + deps
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true
          registry-url: "https://registry.npmjs.org"

      # changesets/action@v1 shells out to the package manager (pnpm) for its
      # version/publish lifecycle, and vp deliberately does NOT expose a `pnpm`
      # shim on PATH. Enable corepack so that action can provision the pinned
      # pnpm from package.json#packageManager. Scoped to the release pipeline
      # only — ci.yml stays pure vp.
      - name: Enable Corepack (for changesets/action only)
        run: corepack enable

      - name: Lint (Biome)
        run: vp exec biome ci .

      - name: Build
        run: vp run build

      - name: Typecheck
        run: vp run typecheck

      # publish 步骤走 scripts/publish.mjs:它从 .changeset/pre.json 读 changeset
      # pre 模式来定 npm dist-tag(pre 模式 → 其 tag 如 alpha,否则 latest),再调
      # `pnpm publish -r`(--provenance 供应链溯源、--access public 供 scoped 包首发)。
      # pre.json 是唯一开关 —— `changeset pre enter` / `changeset pre exit` 自动切换
      # dist-tag,本 workflow 与脚本都无需手改。node / pnpm 分别由 setup-vp 与上方
      # corepack enable 提供。
      - name: Create Version PR or Publish
        uses: changesets/action@v1
        with:
          publish: node scripts/publish.mjs
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
