name: Publish

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  ci-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Installs vp + repo-pinned Node (.node-version) + runs `vp install`
      # (frozen on CI). `registry-url` makes setup-vp write ~/.npmrc with
      # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` so
      # `changeset publish` (scripts/publish.mjs) authenticates via the
      # NODE_AUTH_TOKEN exported on the changesets step below.
      - name: Setup Vite+ (vp) + Node + deps
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true
          registry-url: "https://registry.npmjs.org"

      # changesets/action@v1 shells out to the package manager (pnpm) for its
      # version/publish lifecycle, and vp deliberately does NOT expose a `pnpm`
      # shim on PATH. Enable corepack so that action can provision the pinned
      # pnpm from package.json#packageManager. Scoped to the release pipeline
      # only — ci.yml stays pure vp.
      - name: Enable Corepack (for changesets/action only)
        run: corepack enable

      - name: Lint (Biome)
        run: vp exec biome ci .

      - name: Build
        run: vp run build

      - name: Typecheck
        run: vp run typecheck

      - name: Create Version PR or Publish
        uses: changesets/action@v1
        with:
          publish: node scripts/publish.mjs
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
