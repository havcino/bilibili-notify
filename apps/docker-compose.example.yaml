# 用法:cp docker-compose.example.yaml docker-compose.yaml && docker compose up -d
# 配置走 B 模型:首启动后改配置请编辑 ./config/bn.config.yaml 再 docker compose restart。

services:
  bilibili-notify:
    image: akokk0/bilibili-notify:alpha
    # 本地构建改用:build: { context: .., dockerfile: apps/Dockerfile }
    container_name: bilibili-notify
    restart: unless-stopped
    ports:
      - "8787:8787"
      # 用 OneBot 反向 WS 适配器时,把它的监听端口也映射出来,如 "9797:9797"
    environment:
      # BN_* 仅首启动 seed 进 yaml;之后改值请编辑 ./config/bn.config.yaml
      BN_LOG_LEVEL: info
      # dashboard 登录凭据;首启动后请改掉默认密码。删掉这两行则自动生成随机密码
      BN_DASHBOARD_USER: admin
      BN_DASHBOARD_PASS: change-me-on-first-boot
      # BN_COOKIE_KEY: ""          # secrets 加密密钥,openssl rand -base64 32
    volumes:
      - ./data:/data              # 运行时状态
      - ./config:/config          # bn.config.yaml 所在
    # depends_on: [napcat]

