# Usage:
#   cp docker-compose.example.yaml docker-compose.yaml
#   cp server/bn.config.example.yaml ./bn.config.yaml      # edit dataDir / auth
#   docker compose up -d

services:
  bilibili-notify:
    image: akokk0/bilibili-notify:latest
    # Or build locally:
    # build:
    #   context: ..
    #   dockerfile: apps/Dockerfile
    container_name: bilibili-notify
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      BN_LOG_LEVEL: info
      # TZ: Asia/Shanghai          # 时区(决定日志/历史按日切文件的本地"今天",镜像默认已设)
      # BN_DASHBOARD_USER: admin
      # BN_DASHBOARD_PASS: change-me
    volumes:
      - ./data:/data
      - ./bn.config.yaml:/app/apps/server/bn.config.yaml:ro
    # depends_on:
    #   - napcat

  # Optional NapCat sidecar (OneBot v11). Configure via WebUI on first launch,
  # then add PushTarget platform=onebot baseUrl=http://napcat:3000 in dashboard.
  # napcat:
  #   image: mlikiowa/napcat-docker:latest
  #   container_name: napcat
  #   restart: unless-stopped
  #   ports:
  #     - "6099:6099"
