# Usage:
#   cp docker-compose.example.yaml docker-compose.yaml
#   docker compose up -d
#
# host 端布局(./data 跟 ./config 在 docker-compose.yaml 同级平铺):
#   ./
#   ├── data/                  # state(订阅 / 历史 / 日志 / 凭据 等持久数据)
#   ├── config/                # 配置目录
#   │   └── bn.config.yaml     # 首次启动后自动出现(B 模型 seed)
#   └── docker-compose.yaml
#
# 配置模型(B):BN_* 环境变量仅在**首次启动**写入 ${BN_CONFIG} 指向的 yaml,
# 此后 loader 忽略所有 env,以 yaml 为真相。改配置 → 编辑 ./config/bn.config.yaml
# + docker compose restart。完全重置 → rm ./config/bn.config.yaml + 再启动一次。
# 详见 apps/server/src/config/loader.ts 顶部注释。

services:
  bilibili-notify:
    image: akokk0/bilibili-notify:latest
    # Or build locally:
    # build:
    #   context: ..
    #   dockerfile: apps/Dockerfile
    container_name: bilibili-notify
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      # 注意:BN_CONFIG / BN_DATA_DIR / BN_CHROME_PATH / BN_WEB_DIST / BN_HOST / BN_PORT
      # 都是镜像 Dockerfile ENV 默认注入的(在 image 里固定),不要在这里重写 —
      # 改坏路径会让 B 模型 seed 文件落到错位置,产生混乱。
      #
      # 以下 BN_* 是 first-boot seed 源,**仅首次启动**写入 ${BN_CONFIG} 指向的 yaml;
      # 之后修改这里无效,要改值请编辑 ./config/bn.config.yaml 后重启容器。
      BN_LOG_LEVEL: info
      # TZ: Asia/Shanghai          # 时区(决定日志/历史按日切文件的本地"今天",镜像默认已设)
      # BN_DASHBOARD_USER: admin
      # BN_DASHBOARD_PASS: change-me-on-first-boot
      # BN_COOKIE_KEY: change-me-too   # AES-256-GCM 派生密钥
    volumes:
      - ./data:/data
      - ./config:/config
    # depends_on:
    #   - napcat

  # Optional NapCat sidecar (OneBot v11). Configure via WebUI on first launch,
  # then add PushTarget platform=onebot baseUrl=http://napcat:3000 in dashboard.
